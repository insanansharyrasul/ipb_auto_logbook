name: Build Windows exe

on:
  push:
    tags: ["v*"]        # tag a release, e.g. `git tag v1.0.0 && git push --tags`
  workflow_dispatch: {}  # or run manually from the Actions tab

permissions:
  contents: write   # required for action-gh-release to create/attach the release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install Chromium into the playwright package
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"   # bundle it, don't use the machine cache
        run: playwright install chromium

      - name: Build exe
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: pyinstaller ipb_auto_logbook.spec

      - name: Stage user-editable data next to the exe
        shell: pwsh
        run: |
          Copy-Item data.csv dist/IPB-Auto-Logbook/
          Copy-Item files   dist/IPB-Auto-Logbook/files -Recurse

      - name: Zip the bundle
        shell: pwsh
        run: Compress-Archive -Path dist/IPB-Auto-Logbook/* -DestinationPath IPB-Auto-Logbook-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: IPB-Auto-Logbook-Windows
          path: IPB-Auto-Logbook-Windows.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: IPB-Auto-Logbook-Windows.zip
